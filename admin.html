<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Iphone</title>
    <link rel="stylesheet" href="/admin.css" />
  </head>

  <body>
    <div class="container">
    <h1>Add iPhone</h1>
    <form id="productForm" action="/add-product" method="post">
      <div class="section">
        <h2>Add Products</h2>
        <label for="productname">Product-name </label>
        <br />
        <input type="text" name="product_name" />
        <br />
        <label for="producturl">Product-url</label>
        <br />
        <input type="text" name="product_url" />
      </div>
      <div class="section">
        <h2>Add product details</h2>
        <label for="product_color">product_color </label>
        <br />
        <input type="text" name="product_color" />
        <br />
        <label for="product_storage">product_storage</label>
        <br />
        <input type="text" name="product_storage" />
      </div>
      <div class="section">
        <h2>Add product description</h2>
        <label for="product_brief_description"
          >product_brief_description
        </label>
        <br />
        <textarea
          name="product_brief_description"
          id=""
          cols="30"
          rows="10"
        ></textarea>
        <br />
        <label for="product_description">product_description</label>
        <br />
        <textarea
          name="product_description"
          id=""
          cols="30"
          rows="10"
        ></textarea>
        <br />
        <label for="product_img">product_img_url </label>
        <br />
        <input type="text" name="product_img" />
        <br />
        <label for="product_link">product_link-url</label>
        <br />
        <input type="text" name="product_link" />
      </div>
      <div class="section">
        <h2>Add product Price</h2>
        <label label for="starting_price">starting_price </label>
        <br />
        <input type="text" name="starting_price" />
        <br />
        <label for="price_range">price_range</label>
        <br />
        <input type="text" name="price_range" />
      </div>

      <br /><br />
      <input class="submit-btn" type="submit" value="Add product" />
    </form>

    <div id="displaySection" class="list-header">
      <h2>Products from Database</h2>
      <button id="refreshBtn" class="refresh-btn" type="button">Refresh List</button>
    </div>

    <div class="products-wrap">
      <div id="status" class="status">Loading products...</div>
      <table id="productsTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>URL</th>
            <th>Brief Description</th>
            <th>Starting Price</th>
            <th>Price Range</th>
          </tr>
        </thead>
        <tbody id="productsBody"></tbody>
      </table>
    </div>
    </div>

    <script src="/admin.js"></script>
  </body>
</html>
