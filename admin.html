<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Iphone</title>
    <link rel="stylesheet" href="/admin.css" />
  </head>

  <body>
    <div class="container">
    <h1>Add iPhone</h1>
    <form id="productForm" action="/add-product" method="post">
      <div class="section">
        <h2>Add Products</h2>
        <label for="productname">Product-name </label>
        <br />
        <input type="text" name="product_name" />
        <br />
        <label for="producturl">Product-url</label>
        <br />
        <input type="text" name="product_url" />
      </div>
      <div class="section">
        <h2>Add product details</h2>
        <label for="product_color">product_color </label>
        <br />
        <input type="text" name="product_color" />
        <br />
        <label for="product_storage">product_storage</label>
        <br />
        <input type="text" name="product_storage" />
      </div>
      <div class="section">
        <h2>Add product description</h2>
        <label for="product_brief_description"
          >product_brief_description
        </label>
        <br />
        <textarea
          name="product_brief_description"
          id=""
          cols="30"
          rows="10"
        ></textarea>
        <br />
        <label for="product_description">product_description</label>
        <br />
        <textarea
          name="product_description"
          id=""
          cols="30"
          rows="10"
        ></textarea>
        <br />
        <label for="product_img">product_img_url </label>
        <br />
        <input type="text" name="product_img" />
        <br />
        <label for="product_link">product_link-url</label>
        <br />
        <input type="text" name="product_link" />
      </div>
      <div class="section">
        <h2>Add product Price</h2>
        <label label for="starting_price">starting_price </label>
        <br />
        <input type="text" name="starting_price" />
        <br />
        <label for="price_range">price_range</label>
        <br />
        <input type="text" name="price_range" />
      </div>

      <br /><br />
      <input class="submit-btn" type="submit" value="Add product" />
    </form>

    <div id="displaySection" class="list-header">
      <h2>Products from Database</h2>
      <button id="refreshBtn" class="refresh-btn" type="button">Refresh List</button>
    </div>

    <div class="products-wrap">
      <div id="status" class="status">Loading products...</div>
      <table id="productsTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>URL</th>
            <th>Brief Description</th>
            <th>Starting Price</th>
            <th>Price Range</th>
          </tr>
        </thead>
        <tbody id="productsBody"></tbody>
      </table>
    </div>
    </div>

    <script>
      const productForm = document.getElementById("productForm");
      const productsBody = document.getElementById("productsBody");
      const productsTable = document.getElementById("productsTable");
      const status = document.getElementById("status");
      const refreshBtn = document.getElementById("refreshBtn");
      const displaySection = document.getElementById("displaySection");

      function escapeHtml(text) {
        return String(text ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      async function loadProducts() {
        status.style.display = "block";
        status.textContent = "Loading products...";
        productsTable.style.display = "none";

        try {
          const response = await fetch("/iphones");
          if (!response.ok) throw new Error("Failed to load products");

          const data = await response.json();
          const products = data.products || [];

          if (products.length === 0) {
            status.textContent = "No products found in database.";
            return;
          }

          productsBody.innerHTML = products
            .map(
              (product) => `
                <tr>
                  <td>${escapeHtml(product.product_name)}</td>
                  <td>${escapeHtml(product.product_url)}</td>
                  <td>${escapeHtml(product.product_brief_description)}</td>
                  <td>${escapeHtml(product.starting_price)}</td>
                  <td>${escapeHtml(product.price_range)}</td>
                </tr>
              `
            )
            .join("");

          status.style.display = "none";
          productsTable.style.display = "table";
        } catch (error) {
          status.textContent =
            "Could not load data from database. Check server/MySQL and try again.";
        }
      }

      refreshBtn.addEventListener("click", loadProducts);
      productForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(productForm);
        const submitBtn = productForm.querySelector(".submit-btn");
        const originalBtnText = submitBtn.value;
        submitBtn.value = "Saving...";
        submitBtn.disabled = true;

        try {
          const response = await fetch("/add-product", {
            method: "POST",
            body: new URLSearchParams(formData),
          });

          if (!response.ok) throw new Error("Failed to insert product");

          await loadProducts();
          productForm.reset();
          displaySection.scrollIntoView({ behavior: "smooth", block: "start" });
        } catch (error) {
          alert("Could not insert product. Please check server and database.");
        } finally {
          submitBtn.value = originalBtnText;
          submitBtn.disabled = false;
        }
      });
      loadProducts();
    </script>
  </body>
</html>
